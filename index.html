<script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // 1. Спочатку миттєво беремо те, що є в пам'яті телефону
        let s = parseInt(localStorage.getItem('bobr_score')) || 0;
        document.getElementById('score').innerText = s;

        // 2. Одразу запитуємо хмару Telegram: "А що у тебе?"
        tg.CloudStorage.getItem('user_score', (err, value) => {
            if (!err && value) {
                let cloudScore = parseInt(value);
                // Якщо в хмарі більше, ніж у телефоні (наприклад, зайшов з іншого ака) - оновлюємо
                if (cloudScore > s) {
                    s = cloudScore;
                    document.getElementById('score').innerText = s;
                    localStorage.setItem('bobr_score', s.toString());
                }
            }
        });

        // Клік - працює миттєво
        document.getElementById('bobr').onclick = () => {
            s++;
            document.getElementById('score').innerText = s;
            localStorage.setItem('bobr_score', s.toString());
            tg.HapticFeedback.impactOccurred('light');
        };

        // Кожні 5 секунд відправляємо в хмару актуальну цифру
        setInterval(() => {
            tg.CloudStorage.setItem('user_score', s.toString(), (err) => {
                if (!err) console.log("Хмара оновлена:", s);
            });
        }, 5000);
    </script>
