<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"><script src="https://telegram.org/js/telegram-web-app.js"></script><style>
body{background:#000;color:#fff;text-align:center;font-family:sans-serif;margin:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;-webkit-user-select:none}
.t{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1}.active{display:flex}
.st{font-size:20px;color:gold;margin:5px}#sc{font-size:60px;color:gold;font-weight:bold}#bobr{width:200px;cursor:pointer;transition:transform .05s;position:relative}#bobr:active{transform:scale(.9)}
.b-bg{width:220px;height:10px;background:#333;border-radius:10px;border:1px solid #fff;margin:10px 0;overflow:hidden}#b-f{width:100%;height:100%;background:gold}
.c{background:#222;width:90%;padding:10px;border-radius:12px;margin:5px;display:flex;justify-content:space-between;align-items:center;border:1px solid #444}
.btn{background:gold;color:#000;border:none;padding:8px 12px;border-radius:8px;font-weight:bold}.btn:disabled{background:#555;color:#aaa}
.n{display:flex;background:#111;padding:10px 0 20px;border-top:1px solid #333}.n div{flex:1;color:#888;font-size:14px}.n .a{color:gold}#bt{color:cyan;font-size:24px;font-weight:bold;height:30px}
.plus{position:absolute;color:gold;font-weight:bold;font-size:24px;pointer-events:none;animation:up 0.6s ease-out forwards}@keyframes up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-100px)}}
</style></head><body><div class="st">💰 <span class="cs">0</span></div>
<div id="g" class="t active"><div id="sc">0</div><div id="bt"></div><div style="position:relative"><img src="bobr.jpg" id="bobr"></div><div class="b-bg"><div id="b-f"></div></div><div id="en">⚡ 250 / 250</div></div>
<div id="s" class="t"><h2>Шоп</h2><div class="c"><div><b>X5 СИЛА</b><br><small>20 сек (200 монет)</small></div><button class="btn" id="bz">Купити</button></div></div>
<div id="z" class="t"><h2>Завд</h2><div class="c"><div><b>Друзі</b><br><small>+500</small></div><button class="btn" id="bi">Клик</button></div></div>
<div class="n"><div class="act a" onclick="sh('g',this)">Гра</div><div onclick="sh('s',this)">Шоп</div><div onclick="sh('z',this)">Завд</div></div><script>
var tg=window.Telegram.WebApp,s=0,e=250,bst=1,bt=0;tg.expand();
var sE=document.getElementById('sc'),fE=document.getElementById('b-f'),eE=document.getElementById('en'),bz=document.getElementById('bz'),btE=document.getElementById('bt'),bI=document.getElementById('bobr');
function u(){sE.innerText=s;document.querySelectorAll('.cs').forEach(x=>x.innerText=s);eE.innerText="⚡ "+Math.floor(e)+"/250";fE.style.width=(e/2.5)+"%";bz.disabled=(s<200||bt>0)}
function sy(){tg.CloudStorage.getItem('sc',(er,v)=>{if(v&&parseInt(v)>s){s=parseInt(v);u()}})}
sy();bI.onclick=(ev)=>{let p=bst;if(e>=1){s+=p;e-=1;u();tg.HapticFeedback.impactOccurred('light');showPlus(ev,p)}if(s%10==0)sv()};
function showPlus(ev,p){let n=document.createElement('div');n.className='plus';n.innerText='+'+p;n.style.left=ev.offsetX+'px';n.style.top=ev.offsetY+'px';bI.parentElement.appendChild(n);setTimeout(()=>n.remove(),600)}
document.getElementById('bz').onclick=()=>{if(s>=200&&bt<=0){s-=200;bst=5;bt=20;u();let i=setInterval(()=>{bt--;btE.innerText="🔥 "+bt+"с";if(bt<=0){clearInterval(i);bst=1;btE.innerText="";u()}sv()},1000)}};
document.getElementById('bi').onclick=()=>{tg.openTelegramLink("https://t.me/share/url?url=https://t.me/YOUR_BOT&text=Грай!");s+=500;u();sv()};
function sh(n,l){document.querySelectorAll('.t').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.n div').forEach(x=>x.classList.remove('a'));document.getElementById(n).classList.add('active');l.classList.add('a')}
function sv(){tg.CloudStorage.setItem('sc',s.toString())}
setInterval(()=>{if(e<250){e++;u()}},1000);setInterval(sv,10000);setInterval(sy,15000);
</script></body></html>
