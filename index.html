<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #score { font-size: 70px; color: gold; font-weight: bold; margin-bottom: 20px; }
        #bobr { width: 250px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #bobr:active { transform: scale(0.95); }
        
        /* Смужка енергії */
        .energy-box { width: 250px; margin-top: 30px; }
        .bar-bg { width: 100%; height: 20px; background: #333; border-radius: 10px; border: 2px solid #fff; overflow: hidden; }
        #bar-fill { width: 100%; height: 100%; background: #ffcc00; }
        #energy-text { margin-top: 8px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="score">0</div>
    
    <img src="bobr.jpg" id="bobr" alt="Бобер">

    <div class="energy-box">
        <div class="bar-bg">
            <div id="bar-fill"></div>
        </div>
        <div id="energy-text">⚡ 500 / 500</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Дані (беремо з пам'яті)
        let s = parseInt(localStorage.getItem('bobr_score')) || 0;
        let e = 500; // Починаємо з повної енергії
        const maxE = 500;

        // Початковий вивід
        document.getElementById('score').innerText = s;

        // Функція кліку
        document.getElementById('bobr').onclick = function() {
            if (e >= 1) {
                s = s + 1;
                e = e - 1;
                
                // Оновлюємо текст і смужку
                document.getElementById('score').innerText = s;
                document.getElementById('energy-text').innerText = "⚡ " + e + " / " + maxE;
                document.getElementById('bar-fill').style.width = (e / maxE * 100) + "%";
                
                // Вібрація
                tg.HapticFeedback.impactOccurred('light');
                
                // Зберігаємо тільки рахунок
                localStorage.setItem('bobr_score', s);
            }
        };

        // Відновлення енергії (1 одиниця в сек)
        setInterval(function() {
            if (e < maxE) {
                e = e + 1;
                document.getElementById('energy-text').innerText = "⚡ " + e + " / " + maxE;
                document.getElementById('bar-fill').style.width = (e / maxE * 100) + "%";
            }
        }, 1000);
    </script>
</body>
</html>
