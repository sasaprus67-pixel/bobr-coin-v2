<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #000; color: #fff; text-align: center; font-family: sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        #score { font-size: 70px; color: gold; font-weight: bold; margin-bottom: 10px; }
        #bobr { width: 230px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #bobr:active { transform: scale(0.95); }
        
        /* Універсальна смужка для всіх пристроїв */
        .e-container { 
            width: 280px; height: 24px; background: #333; 
            border-radius: 12px; border: 2px solid #fff; 
            margin-top: 25px; overflow: hidden; position: relative;
        }
        #e-bar { 
            width: 100%; height: 100%; background: #ffcc00 !important; 
            display: block; transition: width 0.2s; 
        }
        #e-text { font-size: 18px; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="score">0</div>
    <img src="bobr.jpg" id="bobr" alt="Бобер">

    <div class="e-container">
        <div id="e-bar"></div>
    </div>
    <div id="e-text">⚡ 500 / 500</div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        var score = 0;
        var energy = 500;
        var maxEnergy = 500;

        var scoreEl = document.getElementById('score');
        var barEl = document.getElementById('e-bar');
        var textEl = document.getElementById('e-text');

        // Функція завантаження
        function loadData() {
            tg.CloudStorage.getItem('total_clicks', function(err, value) {
                if (!err && value) {
                    var cloudScore = parseInt(value);
                    if (cloudScore > score) {
                        score = cloudScore;
                        scoreEl.innerText = score;
                    }
                }
            });
        }

        loadData(); // Завантажуємо при старті

        // Клік
        document.getElementById('bobr').onclick = function() {
            if (energy >= 1) {
                score++;
                energy--;
                updateUI();
                tg.HapticFeedback.impactOccurred('light');
                
                // Кожні 10 кліків примусово штовхаємо в хмару
                if (score % 10 === 0) {
                    saveToCloud();
                }
            }
        };

        function updateUI() {
            scoreEl.innerText = score;
            textEl.innerText = "⚡ " + Math.floor(energy) + " / " + maxEnergy;
            barEl.style.width = (energy / maxEnergy * 100) + "%";
        }

        function saveToCloud() {
            tg.CloudStorage.setItem('total_clicks', score.toString());
        }

        // Відновлення енергії
        setInterval(function() {
            if (energy < maxEnergy) {
                energy++;
                updateUI();
            }
        }, 1000);

        // Постійне збереження в хмару (раз на 5 сек)
        setInterval(saveToCloud, 5000);
        
        // Перевірка хмари (раз на 10 сек) на випадок гри з іншого пристрою
        setInterval(loadData, 10000);

    </script>
</body>
</html>
