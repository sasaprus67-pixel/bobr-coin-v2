<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #score { font-size: 60px; color: cyan; font-weight: bold; }
        #bobr { width: 250px; margin: 20px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        #bobr:active { transform: scale(0.95); }
        #energy-container { width: 250px; height: 20px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #energy-bar { width: 100%; height: 100%; background: gold; }
    </style>
</head>
<body>

    <div id="score">0</div>
    <img src="bobr.jpg" id="bobr">
    <div id="energy-container"><div id="energy-bar"></div></div>
    <div id="status">⚡ 500 / 500</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Дані
        let score = parseInt(localStorage.getItem('score')) || 0;
        let energy = parseInt(localStorage.getItem('energy')) || 500;
        const maxEnergy = 500;

        // Елементи
        const scoreEl = document.getElementById('score');
        const barEl = document.getElementById('energy-bar');
        const statusEl = document.getElementById('status');

        // Оновлення екрану
        function update() {
            scoreEl.innerText = score;
            statusEl.innerText = "⚡ " + energy + " / " + maxEnergy;
            barEl.style.width = (energy / maxEnergy * 100) + "%";
        }

        update();

        // Клік
        document.getElementById('bobr').addEventListener('click', function() {
            if (energy > 0) {
                score++;
                energy--;
                update();
                localStorage.setItem('score', score);
                localStorage.setItem('energy', energy);
                tg.HapticFeedback.impactOccurred('light');
            }
        });

        // Відновлення енергії
        setInterval(function() {
            if (energy < maxEnergy) {
                energy++;
                update();
                localStorage.setItem('energy', energy);
            }
        }, 1000);
    </script>
</body>
</html>
