<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #score { font-size: 60px; color: gold; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        #bobr { width: 260px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }
        #bobr:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="score">0</div>
    <img src="bobr.jpg" id="bobr" alt="Бобер">

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        // Включаємо підтвердження закриття, щоб випадково не вийти
        tg.enableClosingConfirmation();
        
        let s = 0;
        let needsSave = false;

        // Завантаження
        tg.CloudStorage.getItem('user_score', (err, value) => {
            if (!err && value) {
                s = parseInt(value);
                document.getElementById('score').innerText = s;
            }
        });

        document.getElementById('bobr').onclick = () => {
            s++;
            document.getElementById('score').innerText = s;
            tg.HapticFeedback.impactOccurred('light');
            needsSave = true;
        };

        // Зберігаємо кожну 1 секунду, якщо були зміни
        setInterval(() => {
            if (needsSave) {
                tg.CloudStorage.setItem('user_score', s.toString(), (err) => {
                    if (!err) {
                        needsSave = false;
                        console.log('Saved:', s);
                    }
                });
            }
        }, 1000);

        // Фінальна спроба зберегти при закритті
        window.addEventListener('unload', () => {
            if (needsSave) {
                tg.CloudStorage.setItem('user_score', s.toString());
            }
        });
    </script>
</body>
</html>
