<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #score { font-size: 80px; color: gold; font-weight: bold; margin-bottom: 20px; }
        #bobr { width: 260px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #bobr:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="score">0</div>
    <img src="bobr.jpg" id="bobr" alt="Бобер">

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // 1. Беремо рахунок ТІЛЬКИ з пам'яті телефону (це миттєво)
        let s = parseInt(localStorage.getItem('bobr_score')) || 0;
        document.getElementById('score').innerText = s;

        // 2. Окремо завантажуємо з хмари тільки при ПЕРШОМУ запуску, якщо телефон порожній
        if (s === 0) {
            tg.CloudStorage.getItem('user_score', (err, value) => {
                if (!err && value) {
                    s = parseInt(value);
                    document.getElementById('score').innerText = s;
                    localStorage.setItem('bobr_score', s.toString());
                }
            });
        }

        // 3. Клік - записуємо в пам'ять телефону миттєво
        document.getElementById('bobr').onclick = () => {
            s++;
            document.getElementById('score').innerText = s;
            localStorage.setItem('bobr_score', s.toString()); // Телефон запам'ятав за 0.001 сек
            tg.HapticFeedback.impactOccurred('light');
        };

        // 4. Раз на 5 секунд тихенько відправляємо в хмару Telegram про всяк випадок
        setInterval(() => {
            tg.CloudStorage.setItem('user_score', s.toString());
        }, 5000);

    </script>
</body>
</html>
