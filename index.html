<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body{background:#000;color:#fff;text-align:center;font-family:sans-serif;margin:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:manipulation}
        .t{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1}.active{display:flex}
        .st{font-size:20px;color:gold;margin:10px}#sc{font-size:60px;color:gold;font-weight:bold}
        #b{width:200px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.05s}#b:active{transform:scale(.95)}
        .bg{width:220px;height:10px;background:#333;border-radius:10px;border:1px solid #fff;margin:15px 0;overflow:hidden}
        #f{width:100%;height:100%;background:gold}
        .c{background:#222;width:90%;padding:15px;border-radius:12px;margin:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid #444}
        .btn{background:gold;color:#000;border:none;padding:10px 15px;border-radius:8px;font-weight:bold}.btn:disabled{background:#555;color:#aaa}
        .n{display:flex;background:#111;padding:10px 0 25px;border-top:1px solid #333}
        .n div{flex:1;color:#888;font-size:14px;font-weight:bold}.n .a{color:gold}
        #bt{color:cyan;font-size:24px;font-weight:bold;height:30px}
    </style>
</head>
<body>
    <div class="st">💰 <span class="cs">0</span></div>
    <div id="g" class="t active">
        <div id="sc">0</div><div id="bt"></div>
        <img src="bobr.jpg" id="b">
        <div class="bg"><div id="f"></div></div>
        <div id="en">⚡ 250 / 250</div>
    </div>
    <div id="s" class="t">
        <h2>Shop</h2>
        <div class="c">
            <div><b>X5 POWER</b><br><small>20 sec (200 coins)</small></div>
            <button class="btn" id="bz">Buy</button>
        </div>
    </div>
    <div id="z" class="t">
        <h2>Tasks</h2>
        <div class="c">
            <div><b>Invite Friend</b><br><small>Get +500 coins!</small></div>
            <button class="btn" id="bi">Invite</button>
        </div>
    </div>
    <div class="n">
        <div id="ng" class="a" onclick="sh('g',this)">Game</div>
        <div id="ns" onclick="sh('s',this)">Shop</div>
        <div id="nz" onclick="sh('z',this)">Tasks</div>
    </div>
    <script>
var tg=window.Telegram.WebApp, s=0, e=250, bs=1, bt=0, lastC = 0;
tg.expand();
var sE=document.getElementById('sc'), fE=document.getElementById('f'), eE=document.getElementById('en'), bz=document.getElementById('bz'), btE=document.getElementById('bt'), bI=document.getElementById('b'), bInv=document.getElementById('bi');

function u(){sE.innerText=s;document.querySelectorAll('.cs').forEach(x=>x.innerText=s);eE.innerText="⚡ "+Math.floor(e)+"/250";fE.style.width=(e/2.5)+"%";bz.disabled=(s<200||bt>0)}
tg.CloudStorage.getItem('sc',(er,v)=>{if(v&&parseInt(v)>s){s=parseInt(v);u()}});

// ЗАХИСТ ВІД ДЮПУ (Блокуємо клавіатуру)
window.onkeydown = (i) => { if(i.keyCode === 32 || i.keyCode === 13) i.preventDefault(); };

bI.onclick=(v)=>{
    v.preventDefault();
    let now = Date.now();
    if(now - lastC < 35) return; // Анті-клікер
    lastC = now;
    if(e>=1){ s+=bs; e--; u(); tg.HapticFeedback.impactOccurred('light') }
    if(s%10==0)sv();
};

document.getElementById('bz').onclick=()=>{
    if(s>=200&&bt<=0){
        s-=200; bs=5; bt=20; u();
        let i=setInterval(()=>{
            bt--; btE.innerText="🔥 "+bt+"s";
            if(bt<=0){clearInterval(i); bs=1; btE.innerText=""; u()}
            sv();
        },1000);
    }
};

bInv.onclick=()=>{
    let botName = "ВСТАВ_ТУТ_НІК_БОТА"; // Наприклад MyBestBeaverBot (без @)
    let userId = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : "0";
    let inviteLink = "https://t.me/share/url?url=https://t.me/" + botName + "?start=" + userId + "&text=Join my beaver colony! 🦫";
    tg.openTelegramLink(inviteLink);
};

function sh(n,l){
    document.querySelectorAll('.t').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.n div').forEach(x=>x.classList.remove('a'));
    document.getElementById(n).classList.add('active'); l.classList.add('a');
}

function sv(){tg.CloudStorage.setItem('sc',s.toString())}
setInterval(()=>{if(e<250){e++; u()}},1000);
setInterval(sv,10000);
u();
</script>
</body>
</html>
