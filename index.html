<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #000; color: #fff; text-align: center; font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; -webkit-user-select: none;
        }
        #score { font-size: 60px; color: gold; font-weight: bold; margin-bottom: 20px; }
        #bobr { width: 220px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #bobr:active { transform: scale(0.95); }
        #status { font-size: 14px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="score">0</div>
    <img src="bobr.jpg" id="bobr" alt="Бобер">
    <div id="status">Завантаження...</div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready(); // Важливо для iPhone

        var score = 0;
        var scoreEl = document.getElementById('score');
        var statusEl = document.getElementById('status');

        // 1. Спочатку пробуємо взяти з локальної пам'яті
        var localS = localStorage.getItem('bobr_v2');
        if (localS) {
            score = parseInt(localS);
            scoreEl.innerText = score;
        }

        // 2. Отримуємо дані з хмари (синхронізація)
        tg.CloudStorage.getItem('user_score', function(err, value) {
            if (!err && value) {
                var cloudScore = parseInt(value);
                if (cloudScore > score) {
                    score = cloudScore;
                    scoreEl.innerText = score;
                    localStorage.setItem('bobr_v2', score);
                }
            }
            statusEl.innerText = "Синхронізовано";
        });

        // Клік
        document.getElementById('bobr').onclick = function() {
            score++;
            scoreEl.innerText = score;
            localStorage.setItem('bobr_v2', score);
            
            // Легка вібрація
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        };

        // Збереження в хмару кожні 7 секунд
        setInterval(function() {
            tg.CloudStorage.setItem('user_score', score.toString());
        }, 7000);
    </script>
</body>
</html>
