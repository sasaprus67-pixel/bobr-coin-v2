<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #score { font-size: 60px; color: cyan; font-weight: bold; margin-bottom: 10px; }
        #bobr { width: 240px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #bobr:active { transform: scale(0.95); }
        #energy-container { width: 280px; height: 20px; background: #333; border-radius: 10px; margin: 20px auto 0 auto; overflow: hidden; border: 2px solid #fff; }
        #energy-bar { width: 100%; height: 100%; background: #ffcc00; }
        #energy-text { font-size: 18px; margin-top: 10px; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="score">0</div>
    <img src="bobr.jpg" id="bobr">
    <div id="energy-container"><div id="energy-bar" id="bar"></div></div>
    <div id="energy-text">⚡ 500 / 500</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let s = parseInt(localStorage.getItem('bobr_score')) || 0;
        let e = parseInt(localStorage.getItem('bobr_energy')) || 500;
        const maxE = 500;

        const scoreDisp = document.getElementById('score');
        const barDisp = document.getElementById('energy-bar');
        const textDisp = document.getElementById('energy-text');

        // Оновлюємо екран при старті
        scoreDisp.innerText = s;
        
        function redraw() {
            scoreDisp.innerText = s;
            textDisp.innerText = ⚡ ${Math.floor(e)} / ${maxE};
            barDisp.style.width = (e / maxE * 100) + "%";
        }
        
        redraw();

        document.getElementById('bobr').onclick = () => {
            if (e >= 1) {
                s++;
                e--;
                localStorage.setItem('bobr_score', s);
                localStorage.setItem('bobr_energy', e);
                tg.HapticFeedback.impactOccurred('light');
                redraw();
            }
        };

        setInterval(() => {
            if (e < maxE) {
                e++;
                redraw();
                localStorage.setItem('bobr_energy', e);
            }
        }, 1000);
    </script>
</body>
</html>
