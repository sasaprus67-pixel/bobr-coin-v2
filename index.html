<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #000; color: #fff; text-align: center; font-family: sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        #score { font-size: 70px; color: gold; font-weight: bold; margin-bottom: 10px; }
        #bobr { width: 200px; cursor: pointer; transition: transform 0.05s; -webkit-tap-highlight-color: transparent; }
        #bobr:active { transform: scale(0.95); }
        
        /* Смужка, яку БУДЕ ВИДНО ВСЮДИ */
        .e-container { 
            width: 250px; height: 20px; background: #333; 
            border-radius: 10px; border: 2px solid #fff; 
            margin-top: 20px; overflow: hidden; display: block !important;
        }
        #e-bar { width: 100%; height: 100%; background: #ffcc00; display: block; transition: width 0.2s; }
        #status-text { font-size: 14px; margin-top: 5px; color: #aaa; }
    </style>
</head>
<body>

    <div id="score">0</div>
    <img src="bobr.jpg" id="bobr" alt="Бобер">

    <div class="e-container">
        <div id="e-bar"></div>
    </div>
    <div id="status-text">Завантаження даних...</div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        var score = 0;
        var energy = 500;
        var maxE = 500;

        var scoreEl = document.getElementById('score');
        var barEl = document.getElementById('e-bar');
        var statusEl = document.getElementById('status-text');

        // ГОЛОВНА ФУНКЦІЯ: беремо дані тільки з хмари
        function sync() {
            tg.CloudStorage.getItem('total_clicks', function(err, value) {
                if (!err && value) {
                    var cloudScore = parseInt(value);
                    if (cloudScore > score) {
                        score = cloudScore;
                        scoreEl.innerText = score;
                        statusEl.innerText = "Синхронізовано з Telegram";
                    }
                }
            });
        }

        sync(); // Оновити при вході

        document.getElementById('bobr').onclick = function() {
            if (energy >= 1) {
                score++;
                energy--;
                scoreEl.innerText = score;
                barEl.style.width = (energy / maxE * 100) + "%";
                tg.HapticFeedback.impactOccurred('light');
                
                // Зберігаємо в хмару кожні 5 кліків
                if (score % 5 === 0) {
                    tg.CloudStorage.setItem('total_clicks', score.toString());
                }
            }
        };

        // Відновлення енергії
        setInterval(function() {
            if (energy < maxE) {
                energy++;
                barEl.style.width = (energy / maxE * 100) + "%";
            }
        }, 1000);

        // Жорстка синхронізація кожні 10 секунд
        setInterval(sync, 10000);
        // Збереження кожні 5 секунд
        setInterval(function() {
            tg.CloudStorage.setItem('total_clicks', score.toString());
        }, 5000);

    </script>
</body>
</html>
