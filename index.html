<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{background:#000;color:#fff;text-align:center;font-family:sans-serif;margin:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;
-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none}
.t{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1}.active{display:flex}
.st{font-size:20px;color:gold;margin:5px}#sc{font-size:55px;color:gold;font-weight:bold}
#bc{position:relative;width:210px;height:210px;display:flex;align-items:center;justify-content:center;touch-action:none}
#b{width:200px;cursor:pointer;-webkit-tap-highlight-color:transparent;outline:none;user-drag:none;-webkit-user-drag:none}
#b:active{transform:scale(.92)}
.bg{width:220px;height:10px;background:#333;border-radius:10px;border:1px solid #fff;margin:10px 0;overflow:hidden}
#f{width:100%;height:100%;background:gold}
.c{background:#222;width:90%;padding:10px;border-radius:12px;margin:5px;display:flex;justify-content:space-between;align-items:center;border:1px solid #444}
.btn{background:gold;color:#000;border:none;padding:8px 12px;border-radius:8px;font-weight:bold}.btn:disabled{background:#555;color:#aaa}
.n{display:flex;background:#111;padding:10px 0 25px;border-top:1px solid #333}
.n div{flex:1;color:#888;font-size:14px;font-weight:bold}.n .a{color:gold}
#bt{color:#0ff;font-size:24px;font-weight:bold;height:30px}
.p{position:absolute;color:gold;font-weight:bold;font-size:28px;pointer-events:none;animation:u .6s ease-out forwards}
@keyframes u{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-120px)}}
</style></head>
<body>
<div class="st">💰 <span class="cs">0</span></div>
<div id="g" class="t active">
    <div id="sc">0</div><div id="bt"></div>
    <div id="bc"><img src="bobr.jpg" id="b" draggable="false"></div>
    <div class="bg"><div id="f"></div></div>
    <div id="en">250 / 250</div>
</div>
<div id="s" class="t">
    <h2>Шоп</h2>
    <div class="c"><div><b>X5</b><br><small>20с (200)</small></div><button class="btn" id="bz">Купити</button></div>
</div>
<div id="z" class="t">
    <h2>Завд</h2>
    <div class="c"><div><b>Бонус</b><br><small>+500</small></div><button class="btn" id="bi">Клик</button></div>
</div>
<div class="n">
    <div class="a" onclick="sh('g',this)">Гра</div>
    <div onclick="sh('s',this)">Шоп</div>
    <div onclick="sh('z',this)">Завд</div>
</div>
<script>
var tg=window.Telegram.WebApp,s=0,e=250,bs=1,bt=0;tg.expand();
var sE=document.getElementById('sc'),fE=document.getElementById('f'),eE=document.getElementById('en'),bz=document.getElementById('bz'),btE=document.getElementById('bt'),bI=document.getElementById('b'),bC=document.getElementById('bc');

function u(){
    sE.innerText=s;document.querySelectorAll('.cs').forEach(x=>x.innerText=s);
    eE.innerText=Math.floor(e)+"/250";fE.style.width=(e/2.5)+"%";bz.disabled=(s<200||bt>0)
}

tg.CloudStorage.getItem('sc',(er,v)=>{if(v&&parseInt(v)>s){s=parseInt(v);u()}});

// Обробник для тачу (телефони)
bI.addEventListener('touchstart',function(v){
    v.preventDefault(); // Це блокує виділення та сині рамки
    if(e>=1){s+=bs;e--;u();tg.HapticFeedback.impactOccurred('light');
    let t=v.touches[0],r=bC.getBoundingClientRect();P(t.clientX-r.left,t.clientY-r.top,bs)}
    if(s%10==0)sv()
},{passive:false});

// Обробник для кліку (ноут)
bI.addEventListener('mousedown',function(v){
    if(window.innerWidth > 1024) { // Тільки для ноута
        if(e>=1){s+=bs;e--;u();let r=bC.getBoundingClientRect();P(v.clientX-r.left,v.clientY-r.top,bs)}
    }
});

function P(x,y,p){
    let n=document.createElement('div');n.className='p';n.innerText='+'+p;
    n.style.left=x+'px';n.style.top=y+'px';bC.appendChild(n);setTimeout(()=>n.remove(),600)
}

document.getElementById('bz').onclick=()=>{
    if(s>=200&&bt<=0){s-=200;bs=5;bt=20;u();
    let i=setInterval(()=>{bt--;btE.innerText="🔥 "+bt+"с";if(bt<=0){clearInterval(i);bs=1;btE.innerText="";u()}sv()},1000)}
};

document.getElementById('bi').onclick=()=>{
    tg.openTelegramLink("https://t.me/share/url?url=https://t.me/YOUR_BOT&text=Go");s+=500;u();sv()
};

function sh(n,l){
    document.querySelectorAll('.t').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.n div').forEach(x=>x.classList.remove('a'));
    document.getElementById(n).classList.add('active');l.classList.add('a')
}

function sv(){tg.CloudStorage.setItem('sc',s.toString())}
setInterval(()=>{if(e<250){e++;u()}},1000);setInterval(sv,10000);
</script></body></html>
